---
layout: base
title: Pickle Rick Generator
specific_css: project-pickle-rick
specific_js: project-pickle-rick
---
<section id="pickle-rick">
  <div class="container">
    <div class="row">
      <div class="col s12">
        <h2>{{ page.title }}</h2>
        <p>Wanna be a pickle?</p>
      </div>
    </div>

    <div class="row">
      <form class="col s12" action="#">
        <div class="row">
          <div class="col s6">
              <label for="your-face">Upload your picture:</label>
              <div class="file-field input-field">
                <div class="btn">
                  <span>File</span>
                  <input id="your-face" type="file">
                </div>
                <div class="file-path-wrapper">
                  <input class="file-path validate" type="text">
                </div>
              </div>
          </div>
        </div>

        <div class="row">
          <div class="col s6">
            <label for="opacity">Select opacity of uploaded picture:</label>
            <p class="range-field">
              <input type="range" id="opacity" min="0" max="100" />
            </p>
          </div>
        </div>

        <div class="row">
          <div class="col s6">
            <label for="angle">Select rotation angle of uploaded picture:</label>
            <p class="range-field">
              <input type="range" id="angle" min="0" max="360" />
            </p>
          </div>
        </div>
      </form>
    </div>

    <div class="row">
      <div class="col s12">
        <div class="canvas-wrapper">
          <canvas id="layer1" width="605" height="800">Sorry. Your browser does not support HTML5 canvas element.</canvas>
          <canvas id="layer2" width="605" height="800">Sorry. Your browser does not support HTML5 canvas element.</canvas>
        </div>
      </div>
    </div>
  </div>
</section>
