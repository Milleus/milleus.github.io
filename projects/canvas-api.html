---
layout: base
title: Canvas API
specific_css: project-canvas-api
specific_js: project-canvas-api
---
<section id="canvas-api">
  <div class="container">
    <div class="row">
      <div class="col s12">
        <h2>{{ page.title }}</h2>
        <p>Upload images and mess around.</p>
      </div>

      <form action="#" class="col m12">
        <div class="row flex">
          <div class="col m8">

            <div class="row">
              <div class="col m12">
                <label for="upload-image">Upload image</label>
                <div class="file-field input-field">
                  <div class="btn">
                    <span>File</span>
                    <input id="upload-image" type="file">
                  </div>
                  <div class="file-path-wrapper">
                    <input class="file-path validate" type="text">
                  </div>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col m6">
                <label for="opacity">Adjust opacity (percentage)</label>
                <p class="range-field">
                  <input type="range" id="opacity" min="0" max="1" step="0.01" value="1" />
                </p>
              </div>
              <div class="col m6">
                <label for="angle">Adjust rotation (degree)</label>
                <p class="range-field">
                  <input type="range" id="angle" min="0" max="360" value="0" />
                </p>
              </div>
            </div>

            <div class="row">
              <div class="col m6">
                <label for="scale-x">Adjust X-scale (percentage)</label>
                <p class="range-field">
                  <input type="range" id="scale-x" min="0" max="2" step="0.01" value="1" />
                </p>
              </div>
              <div class="col m6">
                <label for="scale-y">Adjust Y-scale (percentage)</label>
                <p class="range-field">
                  <input type="range" id="scale-y" min="0" max="2" step="0.01" value="1" />
                </p>
              </div>
            </div>

          </div>
          <div class="col m4 flex column">
            <label for="">Layers</label>
            <button id="shift-up" class="waves-effect waves-light btn">Shift up</button>
            <button id="shift-down" class="waves-effect waves-light btn">Shift down</button>
            <button id="remove" class="waves-effect waves-light btn">Remove</button>
            <ul class="layer-list">
            </ul>
          </div>
        </div>

      </form>
    </div>

    <div class="row">
      <div class="col s12">
        <!-- <div class="canvas-wrapper"> -->
          <canvas id="canvas">Sorry. Your browser does not support HTML5 canvas element.</canvas>
        <!-- </div> -->
      </div>
    </div>
  </div>
</section>
