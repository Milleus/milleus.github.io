<!DOCTYPE html>
<html>

<head>
  <link rel="shortcut icon" href="/static/img/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="/static/css/materialize.min.css" media="screen,projection">
  <style>
    #melissa { height: 100vh; width: 100vw; }

    .top-card { background-color: #fff; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); margin: 10px; min-width: 40vw; position: fixed; right: 0px; top: 0px; z-index: 1; }
    .top-card .title { background-color: #400101; color: #fff; font-size: 25px; font-weight: 500; padding: 6px 12px; }
    .top-card .loc-wrapper { padding: 0 12px; }
    .top-card #loc-input { margin-bottom: 10px; }
    .top-card #loc-input:focus { border-bottom: 1px solid red; box-shadow: 0 1px 0 0 red; -webkit-box-shadow: 0 1px 0 0 red; }

    #map { height: 100%; width: 100%; }

    .bottom-card { background-color: #fff; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3); bottom: 0; display: none; left: 0; margin: 10px; max-height: 600px; position: fixed; transition: all 1s ease-in-out; z-index: 1; }
    .bottom-card.show { display: flex; }
    .bottom-card > * { padding: 12px; }
    .bottom-card img { max-height: 200px; }
    .bottom-card .dest-details .title { font-size: 25px; font-weight: 500; }
    .bottom-card .dest-details .btn { background-color: red; white-space: nowrap; }
    .bottom-card .dest-details .btn:hover { background-color: #400101; }

    @media only screen and (max-width: 768px) {
      .bottom-card { flex-direction: column; margin: 0; width: 100%; }
      .bottom-card img { display: none; }  
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>Dave Quah - Melissa</title>
</head>

<body>
  <section id="melissa">
    <div class="top-card">
      <div class="title">Where are you at?</div>
      <div class="loc-wrapper">
        <input type="text" id="loc-input" placeholder="Enter your location" autocomplete="on">
      </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
      <img id="dest-photo" src="">
      <div class="dest-details">
        <div id="dest-name" class="title"></div>
        <div id="dest-address"></div>
        <div id="dest-rating"></div>
        <div id="dest-hours"></div>
        <a class="waves-effect waves-light btn" onClick="redrawRouteAndPopulate()">
          <i class="material-icons left">track_changes</i>Find me another place</a>
      </div>
    </div>
  </section>

  <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
  <script src="/static/js/materialize.min.js"></script>
  <script src="/static/js/project-melissa.js"></script>
  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCJ3pN165RQAQKDylBopErNeJHHGK4H2UE&libraries=places&callback=initMap"></script>
</body>

</html>
