---
layout: base
title: Blog Archive
---
<section id="blog">
  <div class="container">
    <div class="row">
      <div class="col s12">
        <h3 class="header">{{ page.title }}</h3>
        <p>Sometimes i write stuff..</p>
          <ul class="posts">
            {% for post in site.posts %}
              <li><span>{{ post.date | date_to_string }}</span> &raquo; <a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a></li>
            {% endfor %}
          </ul>
      </div>
    </div>
  </div>
</section>
