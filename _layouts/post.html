---
layout: base
---
<section id="post">
  <div class="container">
    <div class="row">
      <div class="col s12">
        <h2>{{ page.title }}</h2>
        <p class="meta">{{ page.date | date_to_string }}</p>
        <hr>
        <div class="post-content">
          {{ content }}
        </div>
      </div>
    </div>
  </div>
</section>
