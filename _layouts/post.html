---
layout: base
---
<section class="container-fluid post">
  <div class="container ">
    <div class="row">
      <div class="col-sm-12 col-md-10 post-wrapper">
        <div class="col">
          <h2>{{ page.title }}</h2>
          <p class="meta">{{ page.date | date_to_string }}</p>
          <hr>
          <div class="post-content">
              {{ content }}
          </div>
        </div>
      </div>
      <div class="hidden-sm col-md-2 post-sidebar bg-light">
      </div>
    </div>
  </div>
</section>
