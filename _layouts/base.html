<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="/static/img/favicon.ico"
      type="image/x-icon"
    />
    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon" />

    <title>{{ site.title }} - {{ page.title }}</title>
    <meta
      name="description"
      content="{% if page.excerpt %}{{
        page.excerpt | strip_html | strip_newlines | truncate: 160
      }}{% else %}{{ site.description }}{% endif %}"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link
      type="text/css"
      rel="stylesheet"
      href="/static/css/materialize.min.css"
      media="screen,projection"
    />
    <link type="text/css" rel="stylesheet" href="/static/css/fontello.css" />
    <link type="text/css" rel="stylesheet" href="/static/css/custom.css" />
  </head>

  <body>
    <header>
      {% include side-navigation.html %}
    </header>

    <main>
      {{ content }}
    </main>

    <script type="text/javascript" src="/static/js/materialize.min.js"></script>
    <script type="text/javascript" src="/static/js/custom.js"></script>
  </body>
</html>
