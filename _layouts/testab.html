<!DOCTYPE html>
<html>
  <head>
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:100,200,400,600" rel="stylesheet">  
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="/static/css/materialize.min.css" media="screen,projection"/>
    <link type="text/css" rel="stylesheet" href="/static/css/abtesting.css" media="screen,projection"/>

    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>E-Service - {{ page.title }}</title>
  </head>

  <body>
    <header>
      <nav>
        <div class="container">
          <div class="nav-wrapper">
            <a href="#!" class="brand-logo"><i class="material-icons">cloud</i>Hoseh Bo?</a>
            <ul id="nav-mobile" class="right hide-on-med-and-down">
              {% if page.type == 'A' %}
                <li><a href="/testa/page-one">Page 1</a></li>
                <li><a href="/testa/page-two">Page 2</a></li>
                <li><a href="/testa/page-three">Page 3</a></li>
              {% else %}
                <li><a href="/testb/page-one">Page 1</a></li>
                <li><a href="/testb/page-two">Page 2</a></li>
                <li><a href="/testb/page-three">Page 3</a></li>
              {% endif %}
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main>
      {{ content }}
    </main>
    
    <script type="text/javascript" src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script type="text/javascript" src="/static/js/materialize.min.js"></script>
    <script>
      $(document).ready(function() {
        $('select').material_select();
        // the "href" attribute of the modal trigger must specify the modal ID that wants to be triggered
        $('.modal').modal();
        $('#modal1').modal('open');
      });
    </script>
  </body>
</html>
