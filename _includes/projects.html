<section id="projects">
  <div class="container">
    <div class="row">
      <div class="col s12">
        <h3 class="header">My Projects</h3>
        <p>
          Check out my
          <a href="{{ site.codepen }}" target="_blank">Codepen</a>
          for the fun stuff!
        </p>
      </div>
    </div>
    <div class="row">
      {% for project in site.data.projects %}
      <div class="col m6">
        <div class="card">
          <div class="card-image waves-effect waves-block waves-light">
            <img class="activator" src="{{ project.image_path }}" />
          </div>
          <div class="card-content">
            <span class="card-title activator grey-text text-darken-4">
              {{ project.title }}
              <i class="material-icons right">more_vert</i>
            </span>
            <p>
              <a href="{{ project.href.path }}" target="_blank">
                {{ project.href.name }}
              </a>
            </p>
          </div>
          <div class="card-reveal">
            <span class="card-title grey-text text-darken-4">
              {{ project.title }}
              <i class="material-icons right">close</i>
            </span>
            <p>{{ project.description.main }}</p>
            <p>{{ project.description.sub }}</p>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
