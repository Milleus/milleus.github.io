- title: Scylla
  image_path: /static/img/512-scylla.png
  href:
    name: View repository
    path: https://github.com/Milleus/scylla
  description:
    main: Scylla retrieves a list of mobile application information from App Store and Google Play for further analysis.
    sub: Information from App Store is through use of App Store search API, information from Google Play is from web crawler.

- title: Pandora
  image_path: /static/img/512-pandora.png
  href:
    name: View demo
    path: /projects/pandora
  description:
    main: Pandora analyses speed performance of Singapore government websites and provide recommendations for improvement.
    sub: There is no backend as this purely utilizes Google Pagespeed API. Do take note that it will take some time for queries to return.

- title: Tessara
  image_path: /static/img/512-tessara.gif
  href:
    name: View repository
    path: https://github.com/Milleus/tessara
  description:
    main: Tessara records Telegram chat messages and store in Google Sheets. This utilizes Google Apps Script for web app hosting and Google CacheService for session management.
    sub: This utilizes Google Apps Script for wep app hosting and Google CacheService for session management.

- title: Melissa
  image_path: /static/img/512-melissa.gif
  href:
    name: View demo
    path: /projects/melissa
  description:
    main: Melissa recommends a nearby place to eat based on location. It aims to solve the daily problem of deciding where to eat.
    sub: There is no backend as this purely utilizes Google Maps API.

- title: Rebecca
  image_path: /static/img/512-rebecca.png
  href:
    name: View repository
    path: https://github.com/Milleus/rebecca
  description:
    main: Rebecca gives you access to another user's Mac. This could be modified to easily get SSH access to servers, but its current use is really just to troll people.
    sub: Running this script injects ssh key into the victim's Mac thus giving remote access.

- title: Calorie Calc
  image_path: /static/img/512-calorie-calculator.png
  href:
    name: View site
    path: http://calculator.yolofood.com.sg/
  description:
    main: A calorie calculator that recommends target meal plans based on user information such as age, height, weight, gender and activity level. It aims to help users lose weight through weekly planned meals.
    sub: This was built with Laravel framework.

- title: YOLO FOOD
  image_path: /static/img/512-yolofood.png
  href:
    name: View site
    path: http://yolofood.com.sg/
  description:
    main: A simple content management website for a restaurant that believes in serving healthy food that tastes good.
    sub: This was built from scratch; hosting, setting up content management system, responsive design, and making it easily customizable.
